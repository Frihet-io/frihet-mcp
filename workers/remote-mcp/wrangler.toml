name = "frihet-remote-mcp"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

routes = [{ pattern = "mcp.frihet.io/*", zone_name = "frihet.io" }]

# Agent-facing endpoint runs grouped tool-exposure (progressive disclosure):
# tools/list returns terse summaries + 3 discovery meta-tools instead of the
# flat 151-tool wall. Full depth served on demand via describe_tool/search_tools.
# Read by resolveToolMode() in src/index.ts. npm package stays "full" (local
# clients manage their own context). Rollback = remove this var + redeploy.
# NOTE: top-level [vars] are NOT inherited by [env.openai] (it defines its own
# [env.openai.vars]) — openai-mcp grouped must be set explicitly there.
[vars]
FRIHET_TOOL_MODE = "grouped"

# Static assets for AI-discoverability surface (Wave 1)
# Serves public/ directory via env.ASSETS Fetcher binding.
# Covers: releases.json (pre-distributed from manifest emit)
[assets]
directory = "./public"
binding = "ASSETS"

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "FrihetMCP" }
]

[[migrations]]
new_sqlite_classes = ["FrihetMCP"]
tag = "v1"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "9207b98598f849109139ad11f3b0ac51"

[dev]
port = 8788

# OpenAI-safe deployment: wrangler deploy --env openai
# Serves at openai-mcp.frihet.io with restricted tool set (53/55 tools)
# Gov IDs stripped, openWorldHint corrected, credentials redacted
[env.openai]
name = "frihet-openai-mcp"
routes = [{ pattern = "openai-mcp.frihet.io/*", zone_name = "frihet.io" }]

[env.openai.vars]
FRIHET_OPENAI_MODE = "true"
# Agent-facing (ChatGPT) → grouped too. Top-level [vars] is NOT inherited here,
# so it must be set explicitly. Same progressive-disclosure rationale as mcp.frihet.io.
FRIHET_TOOL_MODE = "grouped"

# DO and KV are NOT inherited — must be redeclared
[env.openai.durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "FrihetMCP" }
]

[[env.openai.kv_namespaces]]
binding = "OAUTH_KV"
id = "9207b98598f849109139ad11f3b0ac51"

# Assets binding must be re-declared per env (same as DO and KV — not inherited).
# OpenAI mode ships a SCOPED asset bundle (public-openai/) so the openapi.json
# served directly by Cloudflare Assets is already reviewed-surface-only.
# Regenerate with: node scripts/scope-openai-openapi.mjs (run before deploy).
[env.openai.assets]
directory = "./public-openai"
binding = "ASSETS"
